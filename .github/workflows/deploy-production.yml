name: Deploy production (v2 — Docker)

# Builds a Docker image in CI, ships it to the VPS as a tarball, and restarts
# the standalone Next.js container behind the existing Traefik.
# Supersedes the static-export rsync approach from ADR 0004 (see ADR 0005).
on:
  # Production ships on a v* release tag only (cut by /bigemotion-release) —
  # never on a bare merge to main. See ADR 0006. workflow_dispatch stays the
  # manual redeploy/rollback path (dispatch with a known-good tag or SHA).
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build and deploy"
        required: false
        default: main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://big-emotion.com
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm test

      # Docker build runs its own pnpm install + next build inside the
      # multi-stage Dockerfile.  The pnpm steps above validate fast; the
      # Docker build produces the deployable artefact.
      - name: Build Docker image
        run: docker build -t big-emotion:deploy .

      - name: Export image as compressed tarball
        run: docker save big-emotion:deploy | gzip > /tmp/big-emotion.tar.gz

      # Pinned known_hosts — never StrictHostKeyChecking=no.
      - name: Configure deploy SSH key
        run: |
          mkdir -p ~/.ssh
          umask 077
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          printf '%s\n' "${{ vars.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/deploy_key ~/.ssh/known_hosts

      - name: Ship image and compose to VPS
        run: |
          scp -i ~/.ssh/deploy_key -P ${{ vars.DEPLOY_PORT }} \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            /tmp/big-emotion.tar.gz \
            "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}:/tmp/big-emotion.tar.gz"
          # Ship the compose from THIS checkout (ref = inputs.ref || github.ref)
          # so the container always restarts with the compose that matches the
          # deployed image. CI never syncs the VPS git clone, so reading the
          # compose from it silently deploys a stale file — this is what broke
          # the SWBE-26 Docker cutover (2026-07-19). Reset --hard on the VPS
          # would instead break workflow_dispatch rollbacks (older image, newest
          # compose); shipping the checkout's copy keeps image and compose in
          # lockstep with the ref.
          scp -i ~/.ssh/deploy_key -P ${{ vars.DEPLOY_PORT }} \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            deploy/docker-compose.yml \
            "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}:/home/ubuntu/big-emotion/website/deploy/docker-compose.yml"

      # Load the image under the live tag and restart.  --pull never ensures
      # Docker Compose uses the locally loaded image, not a registry pull.
      - name: Load image and restart container
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ vars.DEPLOY_PORT }} \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}" \
            "docker load < /tmp/big-emotion.tar.gz && \
             docker tag big-emotion:deploy big-emotion:live && \
             cd /home/ubuntu/big-emotion/website && \
             docker compose -f deploy/docker-compose.yml up -d --no-deps --pull never big-emotion && \
             rm -f /tmp/big-emotion.tar.gz"

      - name: Smoke check
        run: |
          sleep 15
          status=$(curl -fsS -o /dev/null -w '%{http_code}' https://big-emotion.com/)
          if [ "$status" != "200" ]; then
            echo "expected 200 from https://big-emotion.com/, got $status" >&2
            exit 1
          fi
          # -L: /api/health 308-redirects to /api/health/ (trailingSlash), which
          # a bare curl would report as success without ever reaching the route.
          # Assert the JSON body so a redirect or error page can't pass as healthy.
          health=$(curl -fsSL https://big-emotion.com/api/health)
          echo "$health"
          case "$health" in
            *'"status":"ok"'*) ;;
            *) echo "health check did not return status ok: $health" >&2; exit 1 ;;
          esac
