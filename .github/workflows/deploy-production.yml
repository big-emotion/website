name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build and deploy"
        required: false
        default: main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://big-emotion.com
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm test

      - run: pnpm build

      # Pinned known_hosts (never StrictHostKeyChecking=no) so the deploy key
      # is never exposed to a spoofed host.
      - name: Configure deploy SSH key
        run: |
          mkdir -p ~/.ssh
          umask 077
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          printf '%s\n' "${{ vars.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/deploy_key ~/.ssh/known_hosts

      # --delay-updates stages files server-side before swapping (near-atomic
      # publish, same guarantee as deploy.sh). --exclude='/preview' protects
      # the Phase 3 preview subfolder even before it exists.
      - name: Publish static export
        run: |
          rsync -az --delete --delay-updates --exclude='/preview' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ vars.DEPLOY_PORT }} -o UserKnownHostsFile=~/.ssh/known_hosts" \
            out/ "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}:/home/ubuntu/big-emotion/live/"

      - name: Smoke check
        run: |
          status=$(curl -fsS -o /dev/null -w '%{http_code}' https://big-emotion.com/)
          if [ "$status" != "200" ]; then
            echo "expected 200 from https://big-emotion.com/, got $status" >&2
            exit 1
          fi

          status=$(curl -s -o /dev/null -w '%{http_code}' http://big-emotion.com/)
          if [ "$status" != "301" ]; then
            echo "expected 301 from http://big-emotion.com/, got $status" >&2
            exit 1
          fi
