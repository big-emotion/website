name: CI

on:
  # Ferry opens its PRs against the integration branch (FERRY_INTEGRATION_BRANCH),
  # so both it and main must be listed or those PRs would merge ungated.
  pull_request:
    branches: [main, develop]
  # A merge commit on main is a tree no PR run ever built: the PR was tested
  # against an older base. Releases gate on CI being green for the exact SHA
  # being tagged, which only a push-triggered run can provide.
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm test

      # Keyed on the lockfile with the commit SHA as a unique suffix so every
      # run saves a fresh entry; the restore-keys prefix falls back to the
      # most recent cache for the same lockfile so `pnpm build` below still
      # benefits from Next's incremental compilation.
      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      # The /cases routes are pre-rendered from Prismic, so the build needs the read
      # token here exactly as the deploy build does (SWBE-24). Both are repository-level
      # settings, so a fork PR — which gets no secrets — will fail this step; that is the
      # same trade-off the build already makes by pre-rendering real content.
      - run: pnpm build
        env:
          PRISMIC_REPOSITORY_NAME: ${{ vars.PRISMIC_REPOSITORY_NAME }}
          PRISMIC_ACCESS_TOKEN: ${{ secrets.PRISMIC_ACCESS_TOKEN }}
