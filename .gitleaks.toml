# Gitleaks configuration for the CI secret-scan gate. Extends the upstream
# default ruleset; the allowlist exists only for repo-specific noise. An
# allowlisted path is invisible to the scanner forever, so every entry below is
# anchored and justified.
title = "big-emotion gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Known non-secret paths in this repository"
paths = [
  # Anchored so a nested copy (e.g. backup/pnpm-lock.yaml) is still scanned.
  '''^pnpm-lock\.yaml$''',
  # The documented variable names, never their values. Anchored so
  # .env.example.local — which would carry real values — stays scanned.
  '''(^|/)\.env\.example$''',
  # Generated by `pnpm prismic:codegen`; its Prismic document ids trip the
  # generic-api-key rule.
  '''(^|/)prismicio-types\.d\.ts$''',
  # Vendored Draco decoder binaries — third-party build output, high entropy.
  '''^public/draco/''',
  # Self-hosted font binaries: high-entropy blobs, never secrets.
  '''^src/app/fonts/.*\.(woff2?|ttf|otf)$''',
  # A git worktree parked here is a second checkout of this same repo. The scan
  # runs with --no-git (so .gitignore is not honoured) and would otherwise grade
  # another branch's tree, including its own vendored decoder copy.
  '''(^|/)\.claude/''',
  # Next.js build cache and installed dependencies: both absent from the CI
  # checkout (the gitleaks job installs nothing), but --no-git does not honour
  # .gitignore, so a developer running the same command locally would drown in
  # third-party findings without these.
  '''(^|/)\.next/''',
  '''(^|/)node_modules/''',
]

# Matched against the finding itself, never a file path, so a real credential
# added to the same file is still caught.
regexTarget = "match"
regexes = [
  # The Ferry-generated Jira automation rule exports carry the Jira Cloud
  # instance id. It is a UUID identifying the site, not a credential, and its
  # entropy trips the generic-api-key rule. The Authorization headers in those
  # same exports are placeholders — Jira stores the real value as a secret and
  # never writes it into an export.
  # No leading quote: gitleaks reports the match starting at the key name.
  '''clientKey"\s*:\s*"[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"''',
]
