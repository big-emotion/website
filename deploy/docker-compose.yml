# BIG EMOTION — Next.js standalone container behind the host-level Traefik.
# Normal deploy: CI ships a Docker image tarball; deploy-production.yml loads
# it as big-emotion:live and restarts this service.
# Break-glass: `docker compose build` (requires Docker on the VPS).
services:
  big-emotion:
    build:
      context: ..
      dockerfile: Dockerfile
    image: big-emotion:live
    container_name: big-emotion
    restart: unless-stopped
    env_file: .env
    networks:
      - proxy
    volumes:
      # Playground collective counter (SWBE-216/REQ-042, DEC-033): a flat file, not a
      # DB, so it only needs a durable mount — /app/data is pre-created and owned by
      # the nextjs user in the Dockerfile so a fresh volume is writable on first run.
      - playground-data:/app/data
    labels:
      - "traefik.enable=true"
      # HTTPS router — Traefik terminates TLS with the existing ACME resolver.
      - "traefik.http.routers.bigemotion.rule=Host(`big-emotion.com`) || Host(`www.big-emotion.com`)"
      - "traefik.http.routers.bigemotion.entrypoints=websecure"
      - "traefik.http.routers.bigemotion.tls.certresolver=myresolver"
      # HTTP router — redirect to HTTPS via Traefik middleware (replaces
      # the .htaccess RewriteRule; no redirect loop because Traefik owns 80).
      - "traefik.http.routers.bigemotion-http.rule=Host(`big-emotion.com`) || Host(`www.big-emotion.com`)"
      - "traefik.http.routers.bigemotion-http.entrypoints=web"
      - "traefik.http.routers.bigemotion-http.middlewares=bigemotion-https"
      - "traefik.http.middlewares.bigemotion-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.bigemotion-https.redirectscheme.permanent=true"
      - "traefik.http.services.bigemotion.loadbalancer.server.port=3000"

networks:
  proxy:
    external: true

volumes:
  playground-data:
